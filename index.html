<!DOCTYPE html>
<meta charset="utf-8">
<html><head>
    <title>Type4Growth</title><link rel="stylesheet" href="style.css"><script src="script.js" defer></script>

</head>
<body> <div id="wrap"><div id="header">
    <button id="sbtn">Sounds</button>

            <INPUT TYPE="RANGE" ID="rainVolume" min="0" max="1" step="0.01" value="0">

        <div class="sounditem">
            <label>Blossom</label>
            <input type="range" id="blossomVolume" min="0" max="1"

        </div><div class="sounditem"><label>Forest</label>
        <input type="range" id= "forestVolume" min="0"

        </div><button id=

    </div>


    </div>
